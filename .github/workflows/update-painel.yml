name: Atualizar Painel Contas a Pagar

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  gerar-painel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Gerar painel HTML
        env:
          SECRET_NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python gerar_painel.py

      - name: Publicar HTML atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Painel atualizado $(date +'%d/%m/%Y %H:%M')"
          git push
